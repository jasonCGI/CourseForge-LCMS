[build]
builder = "nixpacks"
# Only rebuild this service when its own subdir changes (repo-root-relative).
watchPatterns = ["forgegui/**"]

[deploy]
startCommand = "gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
