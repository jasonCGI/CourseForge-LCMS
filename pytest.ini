[pytest]
# CourseForge P1 test suite.
# Run from the repo root with the project venv:
#   venv/Scripts/python.exe -m pytest
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
markers =
    db: tests that need a live in-memory DB / Flask app context.
