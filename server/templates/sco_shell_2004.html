<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ frame_name }}</title>

  <!-- Video.js — bundled -->
  <link href="assets/video-js/video-js.min.css" rel="stylesheet">
  <script src="assets/video-js/video.min.js"></script>

  <style>
    {{ theme_css }}

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--cf-font, Inter, system-ui, sans-serif);
      font-size: var(--cf-font-size, 16px);
      background: var(--cf-bg, #ffffff);
      color: var(--cf-text, #1a1a1a);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .cf-nav {
      background: var(--cf-nav-bg, #042C53);
      color: var(--cf-nav-text, #B5D4F4);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .cf-nav-title   { font-size: 15px; font-weight: 500; flex: 1; }

    .cf-nav-btn {
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--cf-radius, 6px);
      background: transparent;
      color: var(--cf-nav-text, #B5D4F4);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }

    .cf-nav-btn:hover    { background: rgba(255,255,255,0.1); }
    .cf-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .cf-nav-btn:focus-visible {
      outline: 2px solid var(--cf-accent, #D4820A);
      outline-offset: 2px;
    }

    .cf-progress      { height: 3px; background: rgba(255,255,255,0.15); flex-shrink: 0; }
    .cf-progress-fill {
      height: 100%;
      background: var(--cf-accent, #D4820A);
      transition: width 0.3s ease;
    }

    .cf-content {
      flex: 1;
      padding: 32px 40px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .cf-frame-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--cf-secondary, #042C53);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--cf-accent, #D4820A);
    }

    /* Block styles — same as SCORM 1.2 */
    .cf-text         { margin-bottom: 20px; line-height: 1.7; }
    /* Global reset zeroes padding-left — restore a real list indent. */
    .cf-text ul, .cf-text ol { margin: 8px 0 12px 0; padding-left: 1.6em; }
    .cf-text li      { margin-bottom: 4px; }
    .cf-narration    {
      padding: 10px 14px;
      background: #F0F6FF;
      border-left: 3px solid var(--cf-primary, #185FA5);
      font-style: italic;
      color: var(--cf-primary, #185FA5);
      margin-top: 10px;
      font-size: 14px;
    }
    .cf-media        { padding: 32px; border: 2px dashed var(--cf-primary, #185FA5); border-radius: var(--cf-radius, 6px); text-align: center; background: #F8FBFF; color: var(--cf-primary, #185FA5); margin-bottom: 20px; font-size: 14px; }
    .cf-quiz         { margin-bottom: 20px; }
    .cf-quiz-question { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .cf-choice       { display:block; width:100%; padding:12px 16px; margin-bottom:8px; border:2px solid #ddd; border-radius:var(--cf-radius,6px); background:#fff; font-size:15px; text-align:left; cursor:pointer; font-family:inherit; transition:all 0.15s; }
    .cf-choice:hover { border-color:var(--cf-primary,#185FA5); background:#F0F6FF; }
    .cf-choice.correct   { border-color:#3B8A4A; background:#EAF6EC; color:#1E7E34; }
    .cf-choice.incorrect { border-color:#C0392B; background:#FDECEA; color:#C0392B; }
    .cf-submit       { padding:10px 24px; background:var(--cf-primary,#185FA5); color:#fff; border:none; border-radius:var(--cf-radius,6px); font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:8px; }
    .cf-feedback     { padding:12px 16px; border-radius:var(--cf-radius,6px); margin-top:12px; font-weight:500; display:none; }
    .cf-feedback.correct   { background:#EAF6EC; color:#1E7E34; border:1px solid #3B8A4A; }
    .cf-feedback.incorrect { background:#FDECEA; color:#C0392B; border:1px solid #C0392B; }
    .cf-hotspot-wrap { position:relative; width:100%; padding-bottom:56.25%; background:#E8F0F8; border:1px solid #B5D4F4; border-radius:var(--cf-radius,6px); overflow:hidden; margin-bottom:20px; }
    .cf-hotspot-region { position:absolute; border:2px solid var(--cf-primary,#185FA5); background:rgba(24,95,165,0.1); cursor:pointer; transition:all 0.15s; }
    .cf-hotspot-region:hover { background:rgba(212,130,10,0.2); border-color:var(--cf-accent,#D4820A); }
    .cf-hotspot-label { display:none; position:absolute; bottom:100%; left:0; background:var(--cf-secondary,#042C53); color:#fff; font-size:11px; padding:4px 8px; border-radius:4px 4px 0 0; white-space:nowrap; }
    .cf-hotspot-region:hover .cf-hotspot-label { display:block; }
    .cf-branch       { margin-bottom:20px; }
    .cf-branch-condition { font-size:16px; font-weight:600; margin-bottom:16px; }
    .cf-branch-btns  { display:flex; gap:12px; }
    .cf-branch-btn   { flex:1; padding:14px 20px; border:2px solid; border-radius:var(--cf-radius,6px); font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.15s; }
    .cf-branch-btn.true  { border-color:#3B8A4A; color:#3B8A4A; background:#fff; }
    .cf-branch-btn.false { border-color:#C0392B; color:#C0392B; background:#fff; }
    .cf-branch-btn.true:hover  { background:#3B8A4A; color:#fff; }
    .cf-branch-btn.false:hover { background:#C0392B; color:#fff; }
    .cf-oam-frame    { width:100%; border:none; display:block; margin-bottom:20px; }

    /* Video.js CF skin */
    .cf-video-player .vjs-control-bar { background:var(--cf-nav-bg,#042C53); }
    .cf-video-player .vjs-play-progress,
    .cf-video-player .vjs-volume-level { background:var(--cf-accent,#D4820A); }
    .cf-video-player .vjs-big-play-button { background:var(--cf-accent,#D4820A); border:none; border-radius:50%; width:60px; height:60px; margin-top:-30px; margin-left:-30px; }
    .cf-video-player .vjs-big-play-button .vjs-icon-placeholder::before { color:#000; font-size:28px; line-height:60px; }
  </style>
</head>
<body>

  <nav class="cf-nav" role="navigation" aria-label="Course navigation">
    <span class="cf-nav-title">{{ lesson_name }}</span>
    <button class="cf-nav-btn" id="btn-prev"
      onclick="cfNavigate('prev')" disabled
      aria-label="Previous frame">← Back</button>
    <span style="font-size:12px;opacity:0.6" aria-live="polite">
      {{ counter_index }} / {{ counter_total }}
    </span>
    <button class="cf-nav-btn" id="btn-next"
      onclick="cfNavigate('next')"
      aria-label="Next frame">Next →</button>
  </nav>

  <div class="cf-progress" role="progressbar"
    aria-valuenow="{{ progress_pct }}"
    aria-valuemin="0" aria-valuemax="100"
    aria-label="Course progress">
    <div class="cf-progress-fill" style="width:{{ progress_pct }}%"></div>
  </div>

  <main class="cf-content" id="main-content">
    <h1 class="cf-frame-title">{{ frame_name }}</h1>
    {{ blocks_html|safe }}
  </main>

  <!-- SCORM 2004 3rd Edition API -->
  <script>
  // ── SCORM 2004 wrapper ──────────────────────────────────────
  var scorm2004 = {
    api:   null,
    found: false,
    initialized: false,

    init: function() {
      this.api = this._findAPI(window);
      if (this.api) {
        this.found = true;
        var result = this.api.Initialize('');
        if (result === 'true' || result === true) {
          this.initialized = true;
          this.setValue('cmi.completion_status', 'incomplete');
          this.setValue('cmi.success_status',    'unknown');
        }
      }
    },

    _findAPI: function(win) {
      var attempts = 0;
      while (!win.API_1484_11 && win.parent && win.parent !== win && attempts < 7) {
        win = win.parent;
        attempts++;
      }
      return win.API_1484_11 || null;
    },

    setValue: function(key, val) {
      if (this.api && this.initialized) {
        this.api.SetValue(key, val);
        this.api.Commit('');
      }
    },

    getValue: function(key) {
      if (this.api && this.initialized) {
        return this.api.GetValue(key);
      }
      return '';
    },

    setScore: function(raw, min, max) {
      if (!this.initialized) return;
      var scaled = (raw - min) / (max - min);
      this.setValue('cmi.score.raw',    String(raw));
      this.setValue('cmi.score.min',    String(min));
      this.setValue('cmi.score.max',    String(max));
      this.setValue('cmi.score.scaled', String(scaled.toFixed(4)));
    },

    complete: function() {
      this.setValue('cmi.completion_status', 'completed');
      this.setValue('cmi.success_status',    'passed');
      if (this.api && this.initialized) {
        this.api.Terminate('');
      }
    },

    suspend: function() {
      this.setValue('cmi.completion_status', 'incomplete');
      if (this.api && this.initialized) {
        this.api.Terminate('');
      }
    }
  };

  // ── Navigation ──────────────────────────────────────────────
  var frameIndex  = {{ frame_index }};
  var totalFrames = {{ total_frames }};
  var frameMap    = {{ frame_map_json|safe }};

  function cfNavigate(dir) {
    var next = dir === 'next' ? frameIndex + 1 : frameIndex - 1;
    if (next < 0 || next >= totalFrames) return;

    // Last frame — complete the SCO
    if (next === totalFrames - 1) {
      scorm2004.complete();
    } else {
      scorm2004.suspend();
    }

    window.location.href = frameMap[next];
  }

  document.getElementById('btn-prev').disabled = (frameIndex === 0);
  document.getElementById('btn-next').disabled = (frameIndex === totalFrames - 1);

  // ── Quiz logic ──────────────────────────────────────────────
  function cfSubmitQuiz(blockId, correctIndex) {
    var selected = document.querySelector(
      '#quiz-' + blockId + ' .cf-choice.selected'
    );
    if (!selected) return;

    var idx = parseInt(selected.getAttribute('data-index'));
    var choices = document.querySelectorAll('#quiz-' + blockId + ' .cf-choice');
    choices.forEach(function(btn) { btn.disabled = true; });
    choices[correctIndex].classList.add('correct');
    if (idx !== correctIndex) selected.classList.add('incorrect');

    var isCorrect = idx === correctIndex;
    var fb = document.getElementById('feedback-' + blockId);
    fb.style.display = 'block';
    fb.classList.add(isCorrect ? 'correct' : 'incorrect');

    // Report score via SCORM 2004
    scorm2004.setScore(isCorrect ? 100 : 0, 0, 100);
    if (isCorrect) {
      scorm2004.setValue('cmi.success_status', 'passed');
    }
  }

  function cfSelectChoice(blockId, btn) {
    document.querySelectorAll('#quiz-' + blockId + ' .cf-choice')
      .forEach(function(b) {
        b.classList.remove('selected');
        b.style.borderColor = '';
        b.style.background  = '';
      });
    btn.classList.add('selected');
    btn.style.borderColor = 'var(--cf-primary)';
    btn.style.background  = '#F0F6FF';
  }

  // ── OAM SCORM 2004 bridge ───────────────────────────────────
  window.addEventListener('message', function(e) {
    if (!e.data || e.data.source !== 'oam_scorm_bridge') return;
    var fn   = e.data.fn;
    var args = e.data.args || [];

    // Map SCORM 1.2 calls from OAM to SCORM 2004 equivalents
    var map12to2004 = {
      'LMSInitialize': 'Initialize',
      'LMSSetValue':   'SetValue',
      'LMSGetValue':   'GetValue',
      'LMSCommit':     'Commit',
      'LMSFinish':     'Terminate',
    };

    var fn2004 = map12to2004[fn] || fn;
    var result = null;

    if (scorm2004.api && typeof scorm2004.api[fn2004] === 'function') {
      result = scorm2004.api[fn2004].apply(scorm2004.api, args);
    }

    e.source.postMessage({
      source: 'oam_scorm_bridge_response',
      fn:     fn,
      result: result,
    }, '*');
  });

  // ── Init ────────────────────────────────────────────────────
  scorm2004.init();

  // ── Unload handler ──────────────────────────────────────────
  window.addEventListener('beforeunload', function() {
    scorm2004.suspend();
  });
  </script>

  <script>
  // ── WCN Modal system — 508 compliant (focus trap, Esc, focus return) ──
  var wcnActiveModal = null;
  var wcnTrigger     = null;

  function wcnOpenModal(modalId, triggerId) {
    var modal   = document.getElementById(modalId);
    var trigger = document.getElementById(triggerId);
    if (!modal) return;
    wcnActiveModal = modal;
    wcnTrigger     = trigger;
    modal.removeAttribute('hidden');
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
    var focusable = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (focusable.length > 0) focusable[0].focus();
    document.body.style.overflow = 'hidden';
  }

  function wcnCloseModal(modalId) {
    var modal = document.getElementById(modalId);
    if (!modal) return;
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden', 'true');
    if (wcnTrigger) wcnTrigger.focus();
    wcnActiveModal = null;
    wcnTrigger     = null;
    document.body.style.overflow = '';
  }

  function wcnAcknowledge(modalId, ackBtnId) {
    var ackBtn = document.getElementById(ackBtnId);
    if (ackBtn) { ackBtn.textContent = '✓ Acknowledged'; ackBtn.disabled = true; ackBtn.style.opacity = '0.6'; }
    var trig = wcnTrigger;   // capture before close clears it
    wcnCloseModal(modalId);
    if (trig) {
      trig.style.display = 'none';
      var acked = document.createElement('span');
      acked.textContent = '✓ ' + (trig.dataset.type || 'WCN') + ' acknowledged';
      acked.style.cssText = 'font-size:11px;color:#4CAF50;margin-left:4px';
      trig.parentNode.insertBefore(acked, trig.nextSibling);
    }
  }

  document.addEventListener('keydown', function(e) {
    if (!wcnActiveModal) return;
    var focusable = wcnActiveModal.querySelectorAll('button:not([disabled]), [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    var first = focusable[0], last = focusable[focusable.length - 1];
    if (e.key === 'Escape') { e.preventDefault(); wcnCloseModal(wcnActiveModal.id); return; }
    if (e.key === 'Tab') {
      if (focusable.length === 0) { e.preventDefault(); return; }
      if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
      else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
    }
  });
  </script>

  <script>
  // ── Menu back-pill — "← {menu title}" return affordance ──────────────────
  // Mirror of sco_shell.html. When a learner enters a frame via a menu item, the
  // menu render recorded the SOURCE menu (its own page URL + title) in
  // sessionStorage under 'cf_return_menu'. On each frame load we read it and, if
  // present AND it does not point at THIS page, inject a small branded
  // "← {title}" pill at the top-left of the content area; clicking returns to the
  // menu. EVERYTHING is guarded so a failed read / bad JSON / missing host
  // silently no-ops to "no pill" and never aborts the rest of the page runtime.
  (function(){
    try {
      var raw = null;
      try { raw = sessionStorage.getItem('cf_return_menu'); } catch (e) { return; }
      if (!raw) return;
      var info = null;
      try { info = JSON.parse(raw); } catch (e) { return; }
      if (!info || !info.href || typeof info.href !== 'string') return;
      var here = '';
      try { here = window.location.href; } catch (e) { here = ''; }
      if (info.href === here) return;
      var host = document.querySelector('.cf-content')
              || document.querySelector('.cf-preview-main')
              || document.getElementById('fgui-content')
              || document.body;
      if (!host) return;
      if (host.querySelector && host.querySelector('.cf-menu-backpill')) return;
      var title = (info.title == null ? '' : String(info.title)) || 'Menu';
      var pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'cf-menu-backpill';
      pill.setAttribute('aria-label', 'Back to ' + title);
      pill.style.cssText = 'display:inline-flex;align-items:center;gap:6px;'
        + 'position:absolute;top:12px;left:12px;z-index:30;'
        + 'max-width:240px;padding:5px 12px;border-radius:14px;'
        + 'background:#042C53;color:#fff;border:1px solid #F59E0B;cursor:pointer;'
        + "font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;"
        + 'font-weight:600;line-height:1.2;box-shadow:0 1px 4px rgba(0,0,0,0.25)';
      var arrow = document.createElement('span');
      arrow.setAttribute('aria-hidden', 'true');
      arrow.style.cssText = 'color:#F59E0B;flex:none';
      arrow.textContent = '←';
      var label = document.createElement('span');
      label.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
      label.textContent = title;
      pill.appendChild(arrow);
      pill.appendChild(label);
      pill.addEventListener('click', function(){
        try { window.location.href = info.href; } catch (e) {}
      });
      try {
        var pos = window.getComputedStyle ? window.getComputedStyle(host).position : '';
        if (pos === 'static' || !pos) host.style.position = 'relative';
      } catch (e) {}
      host.insertBefore(pill, host.firstChild);
    } catch (e) { /* never let the back-pill abort the page runtime */ }
  })();
  </script>

  <script>
  // ── Image-swap runtime — click a marked term to swap the frame's media image ──
  // Mirror of sco_shell.html. Trigger <a data-cf-swap data-cf-swap-src> swaps the
  // first <img class="cf-swap-target"> to the resolved image; clicking the active
  // trigger reverts to the default. Fully guarded so a missing target / inert
  // trigger / thrown handler silently no-ops and never aborts the page runtime.
  (function(){
    try {
      var host = document.querySelector('.cf-content')
              || document.querySelector('.cf-preview-main')
              || document.getElementById('fgui-content')
              || document.body;
      if (!host || !host.querySelectorAll) return;
      var triggers = host.querySelectorAll('a[data-cf-swap]');
      if (!triggers.length) return;
      function target(){ try { return host.querySelector('img.cf-swap-target'); } catch(e){ return null; } }
      var defaultSrc = null, active = null;
      function clearActive(){
        try { for (var i=0;i<triggers.length;i++) triggers[i].classList.remove('cf-swap-active'); } catch(e){}
        active = null;
      }
      for (var i=0;i<triggers.length;i++){
        (function(a){
          if (a.__cfSwapWired) return; a.__cfSwapWired = true;
          a.addEventListener('click', function(ev){
            try {
              if (ev && ev.preventDefault) ev.preventDefault();
              var img = target();
              if (!img) return;
              var src = a.getAttribute('data-cf-swap-src');
              if (!src) return;
              if (defaultSrc === null) defaultSrc = img.getAttribute('src') || '';
              if (active === a){ if (defaultSrc) img.setAttribute('src', defaultSrc); clearActive(); return; }
              clearActive();
              img.setAttribute('src', src);
              try { a.classList.add('cf-swap-active'); } catch(e){}
              active = a;
            } catch(e){}
          });
        })(triggers[i]);
      }
    } catch (e) { /* never let image-swap wiring abort the page runtime */ }
  })();
  </script>

  <script>
  // ── IVideo runtime — timecode-triggered interactions (vanilla, self-contained) ──
  // An interaction is a *pause point* when reaching it should hold playback so the
  // learner addresses it. Hotspots/quiz/branch/wcn pause by default (opt out with
  // pause_on_reach:false); passive annotations only pause if explicitly opted in.
  function iVideoShouldPause(i) {
    return i.type === 'annotation' ? !!i.pause_on_reach : i.pause_on_reach !== false;
  }
  function iVideoInit(containerId, interactions, options) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var video   = container.querySelector('video');
    var overlay = container.querySelector('.ivideo-overlay');
    if (!video) return;
    var answered = {};
    var state = { blocking: false };

    // Wire the branded transport bar (custom controls, replacing native ones) and
    // keep a handle so the timeupdate loop below can refresh it.
    var bar = iVideoWireBar(container, video, interactions, answered, state);

    video.addEventListener('timeupdate', function() {
      var t = video.currentTime;
      if (bar) bar.refresh();
      if (overlay) {
        overlay.innerHTML = '';
        interactions.forEach(function(i) {
          var inRange = t >= i.timecode && (!i.end_timecode || t <= i.end_timecode);
          // A consumed (answered) hotspot is gone — don't redraw its resting overlay.
          if (!inRange || !i.data || (i.type === 'hotspot' && answered[i.id])) return;
          if (i.type === 'annotation' && i.data.x != null) {
            var a = document.createElement('div');
            a.style.cssText = 'position:absolute;left:' + i.data.x + '%;top:' + i.data.y + '%;pointer-events:none;z-index:10';
            var inner = document.createElement('div');
            inner.style.cssText = 'background:rgba(4,44,83,0.85);color:#B5D4F4;font-size:11px;padding:3px 8px;border-radius:3px;border:1px solid #185FA5;white-space:nowrap';
            inner.textContent = i.data.text || '';
            a.appendChild(inner); overlay.appendChild(a);
          } else if (i.type === 'hotspot' && i.data.x != null) {
            var h = document.createElement('div');
            h.style.cssText = 'position:absolute;left:' + i.data.x + '%;top:' + i.data.y + '%;transform:translate(-50%,-50%);z-index:10';
            var dot = document.createElement('div');
            dot.style.cssText = 'width:64px;height:64px;border-radius:4px;background:rgba(245,158,11,0.12);border:3px solid #F59E0B';
            dot.setAttribute('role','button'); dot.setAttribute('tabindex','0');
            dot.setAttribute('aria-label', i.data.label || 'Hotspot'); dot.title = i.data.label || '';
            h.appendChild(dot); overlay.appendChild(h);
          }
        });
      }
      if (state.blocking) return;
      for (var k = 0; k < interactions.length; k++) {
        var it = interactions[k];
        if (answered[it.id] || !iVideoShouldPause(it)) continue;
        // Pause once the playhead reaches the marker (within its active window if one
        // is set) so a seek past it doesn't strand an unaddressed interaction.
        if (t >= it.timecode && (!it.end_timecode || t <= it.end_timecode)) {
          state.blocking = true; video.pause();
          iVideoShowBlocking(container, video, it, answered, state);
          break;
        }
      }
    });
  }

  // ── Branded transport bar — custom controls replacing native <video controls> ──
  // Provides play/pause, scrub (gated), time readout, playback speed, and a volume
  // cluster that appears ONLY when the clip carries an audio track. Coexists with
  // the interaction runtime: the blocking modals own resume, so while state.blocking
  // is set the bar's play/scrub are inert (the modal, not the bar, lets you continue),
  // and the scrubber will not seek past the earliest unanswered required interaction.
  var IV_PLAY_SVG  = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.5" color="currentColor" aria-hidden="true" focusable="false"><path d="M6.90588 4.53682C6.50592 4.2998 6 4.58808 6 5.05299V18.947C6 19.4119 6.50592 19.7002 6.90588 19.4632L18.629 12.5162C19.0211 12.2838 19.0211 11.7162 18.629 11.4838L6.90588 4.53682Z" fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var IV_PAUSE_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.5" color="currentColor" aria-hidden="true" focusable="false"><path d="M6 18.4V5.6C6 5.26863 6.26863 5 6.6 5H9.4C9.73137 5 10 5.26863 10 5.6V18.4C10 18.7314 9.73137 19 9.4 19H6.6C6.26863 19 6 18.7314 6 18.4Z" fill="currentColor" stroke="currentColor"/><path d="M14 18.4V5.6C14 5.26863 14.2686 5 14.6 5H17.4C17.7314 5 18 5.26863 18 5.6V18.4C18 18.7314 17.7314 19 17.4 19H14.6C14.2686 19 14 18.7314 14 18.4Z" fill="currentColor" stroke="currentColor"/></svg>';
  function iVideoFmt(s){ if(!isFinite(s)||s<0) s=0; var m=Math.floor(s/60), x=Math.floor(s%60); return m+':'+(x<10?'0':'')+x; }
  function iVideoShouldGate(i){ return i && iVideoShouldPause(i); }
  function iVideoWireBar(container, video, interactions, answered, state) {
    var bar = container.querySelector('[data-cf-ivbar]');
    if (!bar || bar.__cfWired) return null;
    bar.__cfWired = true;
    var play   = bar.querySelector('[data-cf-iv-play]'),
        seek   = bar.querySelector('[data-cf-iv-seek]'),
        cur    = bar.querySelector('[data-cf-iv-cur]'),
        dur    = bar.querySelector('[data-cf-iv-dur]'),
        rateB  = bar.querySelector('[data-cf-iv-rate]'),
        volBox = bar.querySelector('[data-cf-iv-vol]'),
        muteB  = bar.querySelector('[data-cf-iv-mute]'),
        volR   = bar.querySelector('[data-cf-iv-volrange]');
    var rates = (bar.getAttribute('data-rates')||'1').split(',').map(parseFloat), ri = rates.indexOf(1);
    if (ri < 0) ri = 0;
    var seeking = false, hasAudio = null;   // null = undetermined (assume audio for the gate-degrade)

    function ico(p){ play.innerHTML = p ? IV_PAUSE_SVG : IV_PLAY_SVG; play.setAttribute('aria-label', p ? 'Pause' : 'Play'); }

    // The furthest time the learner may seek to: just shy of the earliest unanswered
    // required (pause-point) interaction. Mirrors the runtime's pause-at-marker gate
    // so the bar can't be used to skip an interaction the runtime would otherwise hold.
    function gateCap() {
      var cap = Infinity;
      for (var k = 0; k < interactions.length; k++) {
        var it = interactions[k];
        if (iVideoShouldGate(it) && !answered[it.id] && typeof it.timecode === 'number' && it.timecode < cap) cap = it.timecode;
      }
      return cap;
    }

    // Detect a real audio track the same way the React runtime does: mozHasAudio →
    // audioTracks.length → webkitAudioDecodedByteCount (conclusive only once the
    // playhead has advanced). No support → leave the control shown (assume audio).
    function detectAudio() {
      if (hasAudio === false) return;            // a definitive "no audio" is sticky
      var has = null;
      if (typeof video.mozHasAudio === 'boolean') has = video.mozHasAudio;
      else if (video.audioTracks && typeof video.audioTracks.length === 'number') has = video.audioTracks.length > 0;
      else if (typeof video.webkitAudioDecodedByteCount === 'number') {
        if (video.webkitAudioDecodedByteCount > 0) has = true;
        else if (video.currentTime > 0.1) has = false;
      }
      if (has === null) { if (hasAudio === null) { hasAudio = true; volBox.style.display = 'inline-flex'; } return; }
      hasAudio = has;
      volBox.style.display = has ? 'inline-flex' : 'none';
    }

    play.addEventListener('click', function(){
      if (state.blocking) return;               // the blocking modal owns resume
      if (video.paused) { try { video.play(); } catch(e){} } else video.pause();
    });
    video.addEventListener('play',  function(){ ico(true); });
    video.addEventListener('pause', function(){ ico(false); });
    var meta = function(){ dur.textContent = iVideoFmt(video.duration); detectAudio(); };
    video.addEventListener('loadedmetadata', meta);
    video.addEventListener('loadeddata', meta);
    video.addEventListener('playing', detectAudio);
    video.addEventListener('timeupdate', detectAudio);
    video.addEventListener('ended', function(){ ico(false); });

    seek.addEventListener('input', function(){
      seeking = true;
      if (video.duration) cur.textContent = iVideoFmt(seek.value/1000*video.duration);
    });
    seek.addEventListener('change', function(){
      seeking = false;
      if (!video.duration) return;
      var target = seek.value/1000*video.duration;
      var cap = gateCap();                       // don't let the scrubber jump a required interaction
      if (target > cap) target = Math.max(0, cap - 0.01);
      video.currentTime = target;
    });
    rateB.addEventListener('click', function(){
      ri = (ri+1) % rates.length; video.playbackRate = rates[ri]; rateB.textContent = rates[ri] + 'x';
    });

    if (volR) volR.addEventListener('input', function(){
      var v = volR.value/100; video.volume = v; video.muted = v === 0;
    });
    if (muteB) muteB.addEventListener('click', function(){ video.muted = !video.muted; });
    video.addEventListener('volumechange', function(){
      if (volR) volR.value = String(Math.round((video.muted ? 0 : video.volume) * 100));
      if (muteB) muteB.innerHTML = (video.muted || video.volume === 0) ? '🔇' : '🔊';
    });

    detectAudio();
    return {
      refresh: function() {
        // Reflect playback state, time, and progress; dim play/scrub while a
        // blocking interaction holds the video so the bar can't fight the modal.
        cur.textContent = iVideoFmt(video.currentTime);
        if (!seeking && video.duration) seek.value = String(Math.round(video.currentTime/video.duration*1000));
        var lock = !!state.blocking;
        play.disabled = lock; seek.disabled = lock;
        play.style.opacity = lock ? '0.5' : '1'; seek.style.opacity = lock ? '0.5' : '1';
        detectAudio();
      }
    };
  }

  function iVideoResume(ov, video, state) {
    if (ov && ov.parentNode) ov.parentNode.removeChild(ov);
    state.blocking = false;
    if (video) { try { video.play(); } catch(e) {} }
  }

  function iVideoShowBlocking(container, video, i, answered, state) {
    var ov = document.createElement('div');
    ov.style.cssText = 'position:absolute;inset:0;background:rgba(4,44,83,0.8);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px';
    ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
    var card = document.createElement('div');
    card.style.cssText = 'background:#fff;border-radius:8px;max-width:480px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5)';
    var d = i.data || {};

    // Hotspot HOLD — pause, show a larger yellow square; click it to resume.
    if (i.type === 'hotspot') {
      var hx = (d.x != null ? d.x : 50), hy = (d.y != null ? d.y : 50);
      ov.style.cssText = 'position:absolute;inset:0;background:rgba(4,44,83,0.45);z-index:50';
      var hs = document.createElement('button');
      hs.setAttribute('aria-label', (d.label || 'Hotspot') + ' — click to continue'); hs.title = d.label || '';
      hs.style.cssText = 'position:absolute;left:' + hx + '%;top:' + hy + '%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:4px;background:rgba(245,158,11,0.18);border:3px solid #F59E0B;cursor:pointer;box-shadow:0 0 0 4px rgba(245,158,11,0.25)';
      hs.onclick = function() { answered[i.id] = true; iVideoResume(ov, video, state); };
      ov.appendChild(hs);
      if (d.description) {
        var desc = document.createElement('div');
        desc.style.cssText = 'position:absolute;left:' + hx + '%;top:calc(' + hy + '% + 52px);transform:translateX(-50%);background:#0d1017;color:#B5D4F4;border:1px solid #185FA5;border-radius:6px;padding:6px 10px;font-size:12px;max-width:240px;text-align:center';
        desc.textContent = d.description; ov.appendChild(desc);
      }
      var hint = document.createElement('div');
      hint.style.cssText = 'position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(13,17,23,0.9);color:#F59E0B;border:1px solid #F59E0B;border-radius:20px;padding:6px 16px;font-size:11px;font-weight:600;white-space:nowrap;font-family:monospace';
      hint.textContent = '⏸ ' + (d.label ? d.label + ' — ' : '') + 'click the highlighted area to continue';
      ov.appendChild(hint);
      container.appendChild(ov);
      return;
    }

    if (i.type === 'quiz') {
      card.innerHTML = '<div style="padding:14px 18px;border-bottom:1px solid #eee;background:#f8fbff"><div style="font-size:9px;font-weight:700;color:#185FA5;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;font-family:monospace">Knowledge Check</div><div class="qq" style="font-size:15px;font-weight:600;color:#042C53"></div></div>';
      card.querySelector('.qq').textContent = d.question || '';
      var body = document.createElement('div'); body.style.cssText = 'padding:14px 18px';
      var sel = { idx: null, done: false };
      (d.choices || []).forEach(function(choice, idx) {
        var b = document.createElement('button'); b.className = 'ch'; b.textContent = choice;
        b.style.cssText = 'display:block;width:100%;padding:10px 14px;margin-bottom:8px;border:2px solid #ddd;border-radius:6px;background:#fff;font-size:14px;text-align:left;cursor:pointer;font-family:inherit';
        b.onclick = function() {
          if (sel.done) return;
          [].forEach.call(body.querySelectorAll('button.ch'), function(x){ x.style.borderColor='#ddd'; x.style.background='#fff'; });
          b.style.borderColor = '#185FA5'; b.style.background = '#F0F6FF'; sel.idx = idx;
        };
        body.appendChild(b);
      });
      var fb = document.createElement('div'); fb.style.cssText = 'display:none;margin-top:8px;padding:10px 14px;border-radius:6px;font-size:13px;font-weight:500';
      var submit = document.createElement('button'); submit.textContent = 'Submit';
      submit.style.cssText = 'margin-top:8px;padding:9px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit';
      submit.onclick = function() {
        if (sel.idx === null || sel.done) return;
        sel.done = true;
        var correct = sel.idx === d.correct_index;
        fb.style.display = 'block';
        fb.style.background = correct ? '#EAF6EC' : '#FDECEA';
        fb.style.color = correct ? '#1E7E34' : '#C0392B';
        fb.textContent = correct ? (d.feedback_correct || 'Correct!') : (d.feedback_incorrect || 'Not quite — review and try again.');
        submit.disabled = true; answered[i.id] = true;
        try { if (window.scorm && scorm.setValue) scorm.setValue('cmi.score.scaled', correct ? '1' : '0'); } catch(e) {}
        setTimeout(function() { iVideoResume(ov, video, state); }, 1400);
      };
      body.appendChild(fb); body.appendChild(submit); card.appendChild(body);
    }
    else if (i.type === 'branch') {
      card.innerHTML = '<div style="padding:14px 18px;border-bottom:1px solid #eee;background:#f8fbff"><div style="font-size:9px;font-weight:700;color:#7A3A9A;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;font-family:monospace">Decision Point</div><div class="bq" style="font-size:15px;font-weight:600;color:#042C53"></div></div>';
      card.querySelector('.bq').textContent = d.prompt || d.condition || '';
      var row = document.createElement('div'); row.style.cssText = 'padding:14px 18px;display:flex;gap:10px';
      function mkBranch(label, tc, color) {
        var b = document.createElement('button'); b.textContent = label;
        b.style.cssText = 'flex:1;padding:12px 16px;border:2px solid ' + color + ';border-radius:6px;color:' + color + ';background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit';
        b.onclick = function() { answered[i.id] = true; if (tc != null) { try { video.currentTime = tc; } catch(e) {} } iVideoResume(ov, video, state); };
        return b;
      }
      row.appendChild(mkBranch('✓ ' + (d.true_label || 'Yes'), d.true_timecode, '#3B8A4A'));
      row.appendChild(mkBranch('✕ ' + (d.false_label || 'No'), d.false_timecode, '#C0392B'));
      card.appendChild(row);
    }
    else if (i.type === 'wcn') {
      var wc = d.wcn_type === 'warning' ? { c:'#C0392B', h:'#1a0800' }
             : d.wcn_type === 'caution' ? { c:'#B87A1A', h:'#1a1000' }
             : { c:'#185FA5', h:'#06080f' };
      card.innerHTML = '<div style="padding:14px 18px;background:' + wc.h + ';border-bottom:3px solid ' + wc.c + '"><div class="wtag" style="font-family:monospace;font-size:9px;font-weight:700;color:' + wc.c + ';letter-spacing:0.12em;text-transform:uppercase;margin-bottom:3px"></div><div class="wt" style="font-size:15px;font-weight:700;color:#fff"></div></div><div class="wx" style="padding:14px 18px;font-size:13px;line-height:1.65;color:#1a1a1a"></div>';
      card.querySelector('.wtag').textContent = d.wcn_type || 'note';
      card.querySelector('.wt').textContent = d.title || '';
      card.querySelector('.wx').textContent = d.text || '';
      var foot = document.createElement('div'); foot.style.cssText = 'padding:12px 18px;border-top:1px solid #eee;display:flex;justify-content:flex-end;background:#f8f8f8';
      var ack = document.createElement('button'); ack.textContent = '✓ ' + (d.ack_label || 'I understand — proceed');
      ack.style.cssText = 'padding:8px 20px;background:' + wc.c + ';color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit';
      ack.onclick = function() { answered[i.id] = true; iVideoResume(ov, video, state); };
      foot.appendChild(ack); card.appendChild(foot);
    }
    else {
      answered[i.id] = true; setTimeout(function() { iVideoResume(ov, video, state); }, 0); return;
    }

    ov.appendChild(card); container.appendChild(ov);
  }
  </script>

</body>
