<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ frame_name }}</title>
  <!-- Video.js — bundled for offline SCORM delivery -->
  <link href="assets/video-js/video-js.min.css" rel="stylesheet">
  <script src="assets/video-js/video.min.js"></script>
  <style>
    .cf-video-player .vjs-control-bar { background: var(--cf-nav-bg, #042C53); }
    .cf-video-player .vjs-play-progress,
    .cf-video-player .vjs-volume-level { background: var(--cf-accent, #D4820A); }
    .cf-video-player .vjs-big-play-button {
      background: var(--cf-accent, #D4820A); border: none; border-radius: 50%;
      width: 60px; height: 60px; margin-top: -30px; margin-left: -30px;
    }
    .cf-video-player .vjs-big-play-button .vjs-icon-placeholder::before {
      color: #000; font-size: 28px; line-height: 60px;
    }
    .cf-video-player .vjs-text-track-display .vjs-text-track-cue > div {
      background: rgba(0,0,0,0.85) !important; color: #FFFFFF !important;
      font-size: 14px; padding: 4px 8px; border-radius: 3px;
    }
  </style>
  <style>
    /* ── Resolved theme tokens ── */
    {{ theme_css }}

    /* ── SCO base styles ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--cf-font, Inter, system-ui, sans-serif);
      font-size: var(--cf-font-size, 16px);
      background: var(--cf-bg, #ffffff);
      color: var(--cf-text, #1a1a1a);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Nav */
    .cf-nav {
      background: var(--cf-nav-bg, #042C53);
      color: var(--cf-nav-text, #B5D4F4);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .cf-nav-title { font-size: 15px; font-weight: 500; flex: 1; }

    .cf-nav-btn {
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--cf-radius, 6px);
      background: transparent;
      color: var(--cf-nav-text, #B5D4F4);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }

    .cf-nav-btn:hover { background: rgba(255,255,255,0.1); }
    .cf-nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* Progress bar */
    .cf-progress {
      height: 3px;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }
    .cf-progress-fill {
      height: 100%;
      background: var(--cf-accent, #D4820A);
      transition: width 0.3s ease;
    }

    /* Content */
    .cf-content {
      flex: 1;
      padding: 32px 40px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      position: relative;   /* anchor for docked (bottom) audio bars */
    }
    /* When a docked audio bar is present, reserve space so it never covers
       content. The bar is slim (48px) and pinned inside .cf-content. */
    .cf-content:has([data-cf-dock="bottom"]) {
      padding-bottom: 80px;
    }

    .cf-frame-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--cf-secondary, #042C53);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--cf-accent, #D4820A);
    }

    /* Text block */
    .cf-text { margin-bottom: 20px; line-height: 1.7; }
    /* The global reset zeroes padding-left; restore a real indent so list
       markers sit clearly inside the body text instead of hugging the edge. */
    .cf-text ul, .cf-text ol { margin: 8px 0 12px 0; padding-left: 1.6em; }
    .cf-text li { margin-bottom: 4px; }
    .cf-narration {
      padding: 10px 14px;
      background: #F0F6FF;
      border-left: 3px solid var(--cf-primary, #185FA5);
      border-radius: 0 4px 4px 0;
      font-style: italic;
      color: var(--cf-primary, #185FA5);
      margin-top: 10px;
      font-size: 14px;
    }

    /* Media placeholder */
    .cf-media {
      padding: 32px;
      border: 2px dashed var(--cf-primary, #185FA5);
      border-radius: var(--cf-radius, 6px);
      text-align: center;
      background: #F8FBFF;
      color: var(--cf-primary, #185FA5);
      margin-bottom: 20px;
      font-size: 14px;
    }

    /* Quiz */
    .cf-quiz { margin-bottom: 20px; }
    .cf-quiz-question {
      font-size: 16px;
      font-weight: 600;
      color: var(--cf-secondary, #042C53);
      margin-bottom: 16px;
    }
    .cf-choice {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 8px;
      border: 2px solid #ddd;
      border-radius: var(--cf-radius, 6px);
      background: #fff;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .cf-choice:hover  { border-color: var(--cf-primary, #185FA5); background: #F0F6FF; }
    .cf-choice.correct   { border-color: #3B8A4A; background: #EAF6EC; color: #1E7E34; }
    .cf-choice.incorrect { border-color: #C0392B; background: #FDECEA; color: #C0392B; }
    .cf-submit {
      padding: 10px 24px;
      background: var(--cf-primary, #185FA5);
      color: #fff;
      border: none;
      border-radius: var(--cf-radius, 6px);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
    }
    .cf-feedback {
      padding: 12px 16px;
      border-radius: var(--cf-radius, 6px);
      margin-top: 12px;
      font-weight: 500;
      display: none;
    }
    .cf-feedback.correct   { background: #EAF6EC; color: #1E7E34; border: 1px solid #3B8A4A; }
    .cf-feedback.incorrect { background: #FDECEA; color: #C0392B; border: 1px solid #C0392B; }

    /* Hotspot */
    .cf-hotspot-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #E8F0F8;
      border: 1px solid #B5D4F4;
      border-radius: var(--cf-radius, 6px);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .cf-hotspot-region {
      position: absolute;
      border: 2px solid var(--cf-primary, #185FA5);
      background: rgba(24,95,165,0.1);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cf-hotspot-region:hover {
      background: rgba(212,130,10,0.2);
      border-color: var(--cf-accent, #D4820A);
    }
    .cf-hotspot-label {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 0;
      background: var(--cf-secondary, #042C53);
      color: #fff;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px 4px 0 0;
      white-space: nowrap;
    }
    .cf-hotspot-region:hover .cf-hotspot-label { display: block; }

    /* Branch */
    .cf-branch { margin-bottom: 20px; }
    .cf-branch-condition {
      font-size: 16px;
      font-weight: 600;
      color: var(--cf-secondary, #042C53);
      margin-bottom: 16px;
    }
    .cf-branch-btns { display: flex; gap: 12px; }
    .cf-branch-btn {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid;
      border-radius: var(--cf-radius, 6px);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .cf-branch-btn.true  { border-color: #3B8A4A; color: #3B8A4A; background: #fff; }
    .cf-branch-btn.false { border-color: #C0392B; color: #C0392B; background: #fff; }
    .cf-branch-btn.true:hover  { background: #3B8A4A; color: #fff; }
    .cf-branch-btn.false:hover { background: #C0392B; color: #fff; }

    /* OAM iframe */
    .cf-oam-frame {
      width: 100%;
      border: none;
      display: block;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="cf-nav">
    <span class="cf-nav-title">{{ lesson_name }}</span>
    <button class="cf-nav-btn" id="btn-prev" onclick="cfNavigate('prev')" disabled>← Back</button>
    <span style="font-size:12px; opacity:0.6;">{{ counter_index }} / {{ counter_total }}</span>
    <button class="cf-nav-btn" id="btn-next" onclick="cfNavigate('next')">Next →</button>
  </nav>

  <!-- Progress bar -->
  <div class="cf-progress">
    <div class="cf-progress-fill" style="width: {{ progress_pct }}%"></div>
  </div>

  <!-- Frame content -->
  <div class="cf-content">
    <h1 class="cf-frame-title">{{ frame_name }}</h1>
    {{ blocks_html|safe }}
  </div>

  <!-- SCORM 1.2 API -->
  <script>
  // ── SCORM 1.2 wrapper ──────────────────────────────────────────
  var scorm = {
    api: null,
    found: false,
    init: function() {
      this.api = this._findAPI(window);
      if (this.api) {
        this.found = true;
        this.api.LMSInitialize('');
        this.setValue('cmi.core.lesson_status', 'incomplete');
      }
    },
    _findAPI: function(win) {
      var attempts = 0;
      while (!win.API && win.parent && win.parent !== win && attempts < 7) {
        win = win.parent; attempts++;
      }
      return win.API || null;
    },
    setValue: function(key, val) {
      if (this.api) this.api.LMSSetValue(key, val);
    },
    complete: function() {
      this.setValue('cmi.core.lesson_status', 'completed');
      this.setValue('cmi.core.exit', '');
      if (this.api) this.api.LMSFinish('');
    }
  };

  // ── Navigation ────────────────────────────────────────────────
  var frameIndex  = {{ frame_index }};
  var totalFrames = {{ total_frames }};
  var frameMap    = {{ frame_map_json|safe }};  // {index: "sco_filename.html"}

  function cfNavigate(dir) {
    var next = dir === 'next' ? frameIndex + 1 : frameIndex - 1;
    if (next < 0 || next >= totalFrames) return;
    if (next === totalFrames - 1) scorm.complete();
    window.location.href = frameMap[next];
  }

  document.getElementById('btn-prev').disabled = (frameIndex === 0);
  document.getElementById('btn-next').disabled = (frameIndex === totalFrames - 1);

  // ── Quiz logic ────────────────────────────────────────────────
  function cfSubmitQuiz(blockId, correctIndex) {
    var selected = document.querySelector(
      '#quiz-' + blockId + ' .cf-choice.selected'
    );
    if (!selected) return;
    var idx = parseInt(selected.getAttribute('data-index'));
    var choices = document.querySelectorAll('#quiz-' + blockId + ' .cf-choice');
    choices.forEach(function(btn) { btn.disabled = true; });
    choices[correctIndex].classList.add('correct');
    if (idx !== correctIndex) selected.classList.add('incorrect');
    var fb = document.getElementById('feedback-' + blockId);
    fb.style.display = 'block';
    fb.classList.add(idx === correctIndex ? 'correct' : 'incorrect');
    // Report score to SCORM
    scorm.setValue('cmi.core.score.raw', idx === correctIndex ? '100' : '0');
  }

  function cfSelectChoice(blockId, btn) {
    document.querySelectorAll('#quiz-' + blockId + ' .cf-choice')
      .forEach(function(b) { b.classList.remove('selected'); });
    btn.classList.add('selected');
    btn.style.borderColor = 'var(--cf-primary)';
    btn.style.background  = '#F0F6FF';
  }

  // ── OAM SCORM bridge ─────────────────────────────────────────
  window.addEventListener('message', function(e) {
    if (!e.data || e.data.source !== 'oam_scorm_bridge') return;
    var fn = e.data.fn, args = e.data.args || [], result = null;
    if (scorm.api && typeof scorm.api[fn] === 'function') {
      result = scorm.api[fn].apply(scorm.api, args);
    }
    e.source.postMessage({
      source: 'oam_scorm_bridge_response', fn: fn, result: result
    }, '*');
  });

  // ── Init ─────────────────────────────────────────────────────
  scorm.init();
  </script>

  <script>
  // ── WCN Modal system — 508 compliant (focus trap, Esc, focus return) ──
  var wcnActiveModal = null;
  var wcnTrigger     = null;

  function wcnOpenModal(modalId, triggerId) {
    var modal   = document.getElementById(modalId);
    var trigger = document.getElementById(triggerId);
    if (!modal) return;
    wcnActiveModal = modal;
    wcnTrigger     = trigger;
    modal.removeAttribute('hidden');
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
    var focusable = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (focusable.length > 0) focusable[0].focus();
    document.body.style.overflow = 'hidden';
  }

  function wcnCloseModal(modalId) {
    var modal = document.getElementById(modalId);
    if (!modal) return;
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden', 'true');
    if (wcnTrigger) wcnTrigger.focus();
    wcnActiveModal = null;
    wcnTrigger     = null;
    document.body.style.overflow = '';
  }

  function wcnAcknowledge(modalId, ackBtnId) {
    var ackBtn = document.getElementById(ackBtnId);
    if (ackBtn) { ackBtn.textContent = '✓ Acknowledged'; ackBtn.disabled = true; ackBtn.style.opacity = '0.6'; }
    var trig = wcnTrigger;   // capture before close clears it
    wcnCloseModal(modalId);
    if (trig) {
      trig.style.display = 'none';
      var acked = document.createElement('span');
      acked.textContent = '✓ ' + (trig.dataset.type || 'WCN') + ' acknowledged';
      acked.style.cssText = 'font-size:11px;color:#4CAF50;margin-left:4px';
      trig.parentNode.insertBefore(acked, trig.nextSibling);
    }
  }

  document.addEventListener('keydown', function(e) {
    if (!wcnActiveModal) return;
    var focusable = wcnActiveModal.querySelectorAll('button:not([disabled]), [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    var first = focusable[0], last = focusable[focusable.length - 1];
    if (e.key === 'Escape') { e.preventDefault(); wcnCloseModal(wcnActiveModal.id); return; }
    if (e.key === 'Tab') {
      if (focusable.length === 0) { e.preventDefault(); return; }
      if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
      else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
    }
  });
  </script>

  <script>
  // ── IVideo runtime — timecode-triggered interactions (vanilla, self-contained) ──
  function iVideoInit(containerId, interactions, options) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var video   = container.querySelector('video');
    var overlay = container.querySelector('.ivideo-overlay');
    if (!video) return;
    var answered = {};
    var state = { blocking: false };

    video.addEventListener('timeupdate', function() {
      var t = video.currentTime;
      if (overlay) {
        overlay.innerHTML = '';
        interactions.forEach(function(i) {
          var inRange = t >= i.timecode && (!i.end_timecode || t <= i.end_timecode);
          if (!inRange || !i.data) return;
          if (i.type === 'annotation' && i.data.x != null) {
            var a = document.createElement('div');
            a.style.cssText = 'position:absolute;left:' + i.data.x + '%;top:' + i.data.y + '%;pointer-events:none;z-index:10';
            var inner = document.createElement('div');
            inner.style.cssText = 'background:rgba(4,44,83,0.85);color:#B5D4F4;font-size:11px;padding:3px 8px;border-radius:3px;border:1px solid #185FA5;white-space:nowrap';
            inner.textContent = i.data.text || '';
            a.appendChild(inner); overlay.appendChild(a);
          } else if (i.type === 'hotspot' && i.data.x != null) {
            var h = document.createElement('div');
            h.style.cssText = 'position:absolute;left:' + i.data.x + '%;top:' + i.data.y + '%;transform:translate(-50%,-50%);z-index:10';
            var dot = document.createElement('div');
            dot.style.cssText = 'width:64px;height:64px;border-radius:4px;background:rgba(245,158,11,0.12);border:3px solid #F59E0B';
            dot.setAttribute('role','button'); dot.setAttribute('tabindex','0');
            dot.setAttribute('aria-label', i.data.label || 'Hotspot'); dot.title = i.data.label || '';
            h.appendChild(dot); overlay.appendChild(h);
          }
        });
      }
      if (state.blocking) return;
      for (var k = 0; k < interactions.length; k++) {
        var it = interactions[k];
        if (answered[it.id] || !it.pause_on_reach) continue;
        if (t >= it.timecode) {
          state.blocking = true; video.pause();
          iVideoShowBlocking(container, video, it, answered, state);
          break;
        }
      }
    });
  }

  function iVideoResume(ov, video, state) {
    if (ov && ov.parentNode) ov.parentNode.removeChild(ov);
    state.blocking = false;
    if (video) { try { video.play(); } catch(e) {} }
  }

  function iVideoShowBlocking(container, video, i, answered, state) {
    var ov = document.createElement('div');
    ov.style.cssText = 'position:absolute;inset:0;background:rgba(4,44,83,0.8);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px';
    ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
    var card = document.createElement('div');
    card.style.cssText = 'background:#fff;border-radius:8px;max-width:480px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5)';
    var d = i.data || {};

    // Hotspot HOLD — pause, show a larger yellow square; click it to resume.
    if (i.type === 'hotspot') {
      var hx = (d.x != null ? d.x : 50), hy = (d.y != null ? d.y : 50);
      ov.style.cssText = 'position:absolute;inset:0;background:rgba(4,44,83,0.45);z-index:50';
      var hs = document.createElement('button');
      hs.setAttribute('aria-label', (d.label || 'Hotspot') + ' — click to continue'); hs.title = d.label || '';
      hs.style.cssText = 'position:absolute;left:' + hx + '%;top:' + hy + '%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:4px;background:rgba(245,158,11,0.18);border:3px solid #F59E0B;cursor:pointer;box-shadow:0 0 0 4px rgba(245,158,11,0.25)';
      hs.onclick = function() { answered[i.id] = true; iVideoResume(ov, video, state); };
      ov.appendChild(hs);
      if (d.description) {
        var desc = document.createElement('div');
        desc.style.cssText = 'position:absolute;left:' + hx + '%;top:calc(' + hy + '% + 52px);transform:translateX(-50%);background:#0d1017;color:#B5D4F4;border:1px solid #185FA5;border-radius:6px;padding:6px 10px;font-size:12px;max-width:240px;text-align:center';
        desc.textContent = d.description; ov.appendChild(desc);
      }
      var hint = document.createElement('div');
      hint.style.cssText = 'position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(13,17,23,0.9);color:#F59E0B;border:1px solid #F59E0B;border-radius:20px;padding:6px 16px;font-size:11px;font-weight:600;white-space:nowrap;font-family:monospace';
      hint.textContent = '⏸ ' + (d.label ? d.label + ' — ' : '') + 'click the highlighted area to continue';
      ov.appendChild(hint);
      container.appendChild(ov);
      return;
    }

    if (i.type === 'quiz') {
      card.innerHTML = '<div style="padding:14px 18px;border-bottom:1px solid #eee;background:#f8fbff"><div style="font-size:9px;font-weight:700;color:#185FA5;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;font-family:monospace">Knowledge Check</div><div class="qq" style="font-size:15px;font-weight:600;color:#042C53"></div></div>';
      card.querySelector('.qq').textContent = d.question || '';
      var body = document.createElement('div'); body.style.cssText = 'padding:14px 18px';
      var sel = { idx: null, done: false };
      (d.choices || []).forEach(function(choice, idx) {
        var b = document.createElement('button'); b.className = 'ch'; b.textContent = choice;
        b.style.cssText = 'display:block;width:100%;padding:10px 14px;margin-bottom:8px;border:2px solid #ddd;border-radius:6px;background:#fff;font-size:14px;text-align:left;cursor:pointer;font-family:inherit';
        b.onclick = function() {
          if (sel.done) return;
          [].forEach.call(body.querySelectorAll('button.ch'), function(x){ x.style.borderColor='#ddd'; x.style.background='#fff'; });
          b.style.borderColor = '#185FA5'; b.style.background = '#F0F6FF'; sel.idx = idx;
        };
        body.appendChild(b);
      });
      var fb = document.createElement('div'); fb.style.cssText = 'display:none;margin-top:8px;padding:10px 14px;border-radius:6px;font-size:13px;font-weight:500';
      var submit = document.createElement('button'); submit.textContent = 'Submit';
      submit.style.cssText = 'margin-top:8px;padding:9px 20px;background:#185FA5;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit';
      submit.onclick = function() {
        if (sel.idx === null || sel.done) return;
        sel.done = true;
        var correct = sel.idx === d.correct_index;
        fb.style.display = 'block';
        fb.style.background = correct ? '#EAF6EC' : '#FDECEA';
        fb.style.color = correct ? '#1E7E34' : '#C0392B';
        fb.textContent = correct ? (d.feedback_correct || 'Correct!') : (d.feedback_incorrect || 'Not quite — review and try again.');
        submit.disabled = true; answered[i.id] = true;
        try { if (window.scorm && scorm.setValue) scorm.setValue('cmi.core.score.raw', correct ? '100' : '0'); } catch(e) {}
        setTimeout(function() { iVideoResume(ov, video, state); }, 1400);
      };
      body.appendChild(fb); body.appendChild(submit); card.appendChild(body);
    }
    else if (i.type === 'branch') {
      card.innerHTML = '<div style="padding:14px 18px;border-bottom:1px solid #eee;background:#f8fbff"><div style="font-size:9px;font-weight:700;color:#7A3A9A;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;font-family:monospace">Decision Point</div><div class="bq" style="font-size:15px;font-weight:600;color:#042C53"></div></div>';
      card.querySelector('.bq').textContent = d.prompt || d.condition || '';
      var row = document.createElement('div'); row.style.cssText = 'padding:14px 18px;display:flex;gap:10px';
      function mkBranch(label, tc, color) {
        var b = document.createElement('button'); b.textContent = label;
        b.style.cssText = 'flex:1;padding:12px 16px;border:2px solid ' + color + ';border-radius:6px;color:' + color + ';background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit';
        b.onclick = function() { answered[i.id] = true; if (tc != null) { try { video.currentTime = tc; } catch(e) {} } iVideoResume(ov, video, state); };
        return b;
      }
      row.appendChild(mkBranch('✓ ' + (d.true_label || 'Yes'), d.true_timecode, '#3B8A4A'));
      row.appendChild(mkBranch('✕ ' + (d.false_label || 'No'), d.false_timecode, '#C0392B'));
      card.appendChild(row);
    }
    else if (i.type === 'wcn') {
      var wc = d.wcn_type === 'warning' ? { c:'#C0392B', h:'#1a0800' }
             : d.wcn_type === 'caution' ? { c:'#B87A1A', h:'#1a1000' }
             : { c:'#185FA5', h:'#06080f' };
      card.innerHTML = '<div style="padding:14px 18px;background:' + wc.h + ';border-bottom:3px solid ' + wc.c + '"><div class="wtag" style="font-family:monospace;font-size:9px;font-weight:700;color:' + wc.c + ';letter-spacing:0.12em;text-transform:uppercase;margin-bottom:3px"></div><div class="wt" style="font-size:15px;font-weight:700;color:#fff"></div></div><div class="wx" style="padding:14px 18px;font-size:13px;line-height:1.65;color:#1a1a1a"></div>';
      card.querySelector('.wtag').textContent = d.wcn_type || 'note';
      card.querySelector('.wt').textContent = d.title || '';
      card.querySelector('.wx').textContent = d.text || '';
      var foot = document.createElement('div'); foot.style.cssText = 'padding:12px 18px;border-top:1px solid #eee;display:flex;justify-content:flex-end;background:#f8f8f8';
      var ack = document.createElement('button'); ack.textContent = '✓ ' + (d.ack_label || 'I understand — proceed');
      ack.style.cssText = 'padding:8px 20px;background:' + wc.c + ';color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit';
      ack.onclick = function() { answered[i.id] = true; iVideoResume(ov, video, state); };
      foot.appendChild(ack); card.appendChild(foot);
    }
    else {
      answered[i.id] = true; setTimeout(function() { iVideoResume(ov, video, state); }, 0); return;
    }

    ov.appendChild(card); container.appendChild(ov);
  }
  </script>

</body>
</html>
